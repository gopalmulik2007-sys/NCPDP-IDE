<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NCPDP EDI Translator API</title>

    <link rel="stylesheet" href="css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div class="background">

        <div class="login-container">

            <div class="left-panel">

                <div class="logo">

                    <i class="fa-solid fa-file-waveform"></i>

                </div>

                <h1>NCPDP EDI Translator API</h1>

                <p>
                    Intelligent Parsing & Validation Platform
                </p>

                <ul>

                    <li><i class="fa-solid fa-check"></i> Secure Login</li>

                    <li><i class="fa-solid fa-check"></i> Intelligent Parsing</li>

                    <li><i class="fa-solid fa-check"></i> API Integration</li>

                    <li><i class="fa-solid fa-check"></i> Error Reporting</li>

                </ul>

            </div>

            <div class="right-panel">

                <h2>Welcome Back</h2>

                <p class="subtitle">
                    Login to continue
                </p>

                <form id="loginForm">

                    <div class="input-group">

                        <label>Username</label>

                        <div class="input-box">

                            <i class="fa-solid fa-user"></i>

                            <input
                                type="text"
                                id="username"
                                placeholder="Enter Username"
                                autocomplete="off">

                        </div>

                    </div>

                    <div class="input-group">

                        <label>Password</label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="password"
                                placeholder="Enter Password">

                            <i
                                class="fa-solid fa-eye togglePassword"
                                id="togglePassword">
                            </i>

                        </div>

                    </div>

                    <div class="options">

                        <label>

                            <input type="checkbox">

                            Remember Me

                        </label>

                        <a href="#">Forgot Password?</a>

                    </div>

                    <button type="submit">

                        <i class="fa-solid fa-right-to-bracket"></i>

                        Login

                    </button>

                </form>

                <div class="login-info">

                    <h4>Demo Login</h4>

                    <p><b>Username:</b> admin</p>

                    <p><b>Password:</b> admin123</p>

                </div>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>

</html>
