<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Validation</title>

<link rel="stylesheet" href="../css/validation.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">
<i class="fa-solid fa-file-waveform"></i>
<h2>NCPDP EDI</h2>
</div>

<ul class="menu">

<li onclick="location.href='dashboard.html'">
<i class="fa-solid fa-house"></i>
<span>Dashboard</span>
</li>

<li onclick="location.href='upload.html'">
<i class="fa-solid fa-upload"></i>
<span>File Upload</span>
</li>

<li onclick="location.href='parsing.html'">
<i class="fa-solid fa-code"></i>
<span>Parsing</span>
</li>

<li class="active">
<i class="fa-solid fa-circle-check"></i>
<span>Validation</span>
</li>

<li onclick="location.href='translation.html'">
<i class="fa-solid fa-language"></i>
<span>Translation</span>
</li>

<li onclick="location.href='api.html'">
<i class="fa-solid fa-cloud"></i>
<span>API</span>
</li>

<li onclick="location.href='data.html'">
<i class="fa-solid fa-database"></i>
<span>Data Viewer</span>
</li>

<li onclick="location.href='error.html'">
<i class="fa-solid fa-triangle-exclamation"></i>
<span>Error Reports</span>
</li>

<li onclick="location.href='settings.html'">
<i class="fa-solid fa-gear"></i>
<span>Settings</span>
</li>

<li onclick="location.href='../index.html'">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</li>

</ul>

</aside>

<!-- Main -->

<main class="main-content">

<header class="topbar">

<h1>Validation</h1>

<button id="validateBtn">
<i class="fa-solid fa-play"></i>
Validate
</button>

</header>

<!-- Summary Cards -->

<div class="cards">

<div class="card">
<h3>Total Records</h3>
<h1 id="total">120</h1>
</div>

<div class="card">
<h3>Valid</h3>
<h1 id="valid">0</h1>
</div>

<div class="card">
<h3>Invalid</h3>
<h1 id="invalid">0</h1>
</div>

<div class="card">
<h3>Status</h3>
<h1 id="statusText">Waiting</h1>
</div>

</div>

<!-- Progress -->

<div class="card">

<h2>Validation Progress</h2>

<div class="progress">

<div class="progress-bar" id="progressBar"></div>

</div>

</div>

<!-- Table -->

<div class="card">

<h2>Validation Report</h2>

<table>

<thead>

<tr>

<th>Record</th>
<th>Segment</th>
<th>Status</th>

</tr>

</thead>

<tbody id="validationTable">

</tbody>

</table>

</div>

</main>

</div>

<script src="../js/validation.js"></script>

</body>

</html>
